name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build production bundle
        run: npm run build

      - name: Build Docker image (validation only)
        run: docker build -t energy-monitor-frontend:ci .

  e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build production bundle
        run: npm run build

      - name: Start preview server
        run: npm run preview > /tmp/preview.log 2>&1 &
        shell: bash

      - name: Wait for preview server to be ready
        run: |
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f http://localhost:4173 > /dev/null 2>&1; then
              echo "Preview server is ready"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts - waiting for preview server..."
            sleep 2
          done
          echo "Preview server did not start in time"
          cat /tmp/preview.log
          exit 1

      - name: Run E2E tests
        run: npm run e2e:overzicht
        env:
          E2E_BASE_URL: http://localhost:4173

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
