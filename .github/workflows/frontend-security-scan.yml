name: Frontend Security Scan

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: frontend-security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy report (PR and main)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL

      - name: Enforce no CRITICAL vulnerabilities on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL